title: "Mathematical Foundations of Contemporary Scientific Research"
subtitle: "Online Refresher Course"
dates: "15-July-2026 to 28-July-2026"
center: "Malaviya Mission Teacher Training Centre (MMTTC)"
university: "Kannur University"
address: "Thavakkara, Civil Station. P.O., Kannur District, Kerala - 670 002"
philosophy: |
  The central philosophy of this refresher course is to present mathematics as a foundational language of modern science and technology, viewed from the perspective of a broad scientific audience rather than that of specialists alone.
objectives:
  - title: "Mathematics spoken by everyone who uses it."
    description: "Hear mathematicians, physicists, statisticians, computer scientists, engineers, and industry experts present mathematics through the lens of their own disciplines."
  - title: "If mathematics fascinates you, this programme is for you."
    description: "Designed for anyone from science, engineering, or technology who wants to discover how mathematics shapes modern research and innovation."
  - title: "More than 40 engaging expository lectures."
    description: "Explore beautiful mathematical ideas, their applications, historical evolution, and their role in contemporary science—without the emphasis on technical proofs."
  - title: "Accessible, intuitive, and enjoyable."
    description: "Every lecture is paced for a broad scientific audience and assumes only a basic undergraduate background in mathematics."
target_audience:
  - "Mathematics"
  - "Statistics"
  - "Physics"
  - "Chemistry"
  - "Computer Science"
  - "Other allied Science and Technology disciplines"
features:
  duration: "12 working days"
  daily_schedule: "4 daily sessions"
  session_length: "90 minutes per session"
  cas: "Considered for Career Advancement Scheme (CAS)"
  fee: "None (No Registration Fee)"
  mode: "Online"
